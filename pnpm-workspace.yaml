# pnpm 11 reads the build-script allowlist here (no longer package.json).
# Allow native postinstall builds for trusted deps only.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  unrs-resolver: true
  # esbuild downloads its platform binary; required by Orval's config loader.
  esbuild: true
  # Optional native msgpack accelerator for BullMQ; JS fallback is fine.
  msgpackr-extract: false
  # Install-time analytics phone-home; keep disabled.
  '@scarf/scarf': false
  # Chromium download for mermaid-cli; not needed — ERD outputs Markdown.
  puppeteer: false

overrides:
  multer: ^2.2.0
  # Security — CVE-2026-13149 (brace-expansion ReDoS) and CVE-2026-59869
  # (js-yaml DoS). Transitive-only; remove once parents update.
  'brace-expansion@1': 1.1.16
  'brace-expansion@2': 2.1.2
  'brace-expansion@5': 5.0.7
  'js-yaml@4': 4.3.0
